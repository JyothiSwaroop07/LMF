---
# GNSS Engine (MS-06)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnss-engine
  namespace: lmf
  labels:
    app: gnss-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gnss-engine
  template:
    metadata:
      labels:
        app: gnss-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2115"
    spec:
      containers:
      - name: gnss-engine
        image: lmf/gnss-engine:latest
        imagePullPolicy: Never   # use local image
        ports:
        - containerPort: 9005
          name: grpc
        - containerPort: 2115
          name: metrics
        envFrom:
        - configMapRef:
            name: lmf-common-config
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: gnss-engine
  namespace: lmf
spec:
  selector:
    app: gnss-engine
  ports:
  - name: grpc
    port: 9005
    targetPort: 9005
  type: ClusterIP
